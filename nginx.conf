server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    # Static assets with hashed filenames - long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA icons and manifest
    location ~* \.(png|svg|ico|webmanifest|js)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback (hash mode works without this, but added for safety)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
